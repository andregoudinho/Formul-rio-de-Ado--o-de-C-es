<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Adoção de Cães</title>
</head>

<body>

    <div class="container">

        <h1>Adoção de Cães</h1>
        <h4>Preencha as informações no Formulário</h4>

        <form id="formAdocao">
            <input type="text" id="nome" placeholder="Nome completo"><br><br>

            <input type="text" id="email" placeholder="Email"><br><br>

            <input type="text" id="telefone" placeholder="Telefone"><br><br>

            <input type="text" id="cpf" placeholder="CPF"><br><br>

            <input type="number" id="idade" placeholder="Idade"><br><br>

            <input type="text" id="cidade" placeholder="Cidade"><br><br>

            <label>Moradia:</label>
            <select id="moradia">
                <option value="">Selecione</option>
                <option value="casa">Casa</option>
                <option value="apartamento">Apartamento</option>
            </select><br><br>

            <label>Possui quintal?</label>
            <select id="quintal">
                <option value="">Selecione</option>
                <option value="sim">Sim</option>
                <option value="nao">Não</option>
            </select><br><br>

            <label>Já teve pet?</label>
            <select id="pet">
                <option value="">Selecione</option>
                <option value="sim">Sim</option>
                <option value="nao">Não</option>
            </select><br><br>

            <input type="number" id="horas" placeholder="Horas sozinho por dia"><br><br>

            <input id="motivo" placeholder="Motivo da Adoção"><br><br>

            <label>Possui condições financeiras?</label>
            <select id="condicao">
                <option value="">Selecione</option>
                <option value="sim">Sim</option>
                <option value="nao">Não</option>
            </select><br><br>

            <label>Quando decidiu adotar?</label>
            <select id="decisao">
                <option value="">Selecione</option>
                <option value="hoje">Hoje</option>
                <option value="alguns_dias">Alguns dias</option>
                <option value="mais_tempo">Já faz tempo</option>
            </select><br><br>

            <label>Possui espaço externo para o pet?</label>
            <select id="espaco">
                <option value="">Selecione</option>
                <option value="sim">Sim</option>
                <option value="nao">Não</option>
            </select><br><br>

            <div class="termo">
                <input type="checkbox" id="termo">
                <label for="termo">Aceito o termo</label>
            </div>
            <br>

            <button type="submit">Enviar</button>

        </form>
        <div id="Resultado"></div>

    </div>

    <script src="scripts.js"></script>
</body>

</html>
