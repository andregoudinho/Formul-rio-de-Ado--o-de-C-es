<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="scripts.js"></script>
    <title>Adoção de Cães</title>
</head>

<body>


    <h1>Adoção de Cães</h1>
    <h4>Preencha as informações no Formulário</h4>

    <form id="formAdocao">
        <input type="text" id="nome" placeholder="Nome completo"><br><br>

        <input type="text" id="email" placeholder="Email"><br><br>

        <input type="text" id="telefone" placeholder="Telefone"><br><br>

        <input type="text" id="cpf" placeholder="CPF"><br><br>

        <input type="number" id="idade" placeholder="Idade"><br><br>

        <input type="text" id="cidade" placeholder="Cidade"><br><br>

        <label>Moradia:</label>
        <select id="moradia">
            <option value="">Selecione</option>
            <option value="casa">Casa</option>
            <option value="apartamento">Apartamento</option>
        </select><br><br>

        <label>Possui quintal?</label>
        <select id="quintal">
            <option value="">Selecione</option>
            <option value="sim">Sim</option>
            <option value="nao">Não</option>
        </select><br><br>

        <label>Já teve pet?</label>
        <select id="pet">
            <option value="">Selecione</option>
            <option value="sim">Sim</option>
            <option value="nao">Não</option>
        </select><br><br>

        <input type="number" id="horas" placeholder="Horas sozinho por dia"><br><br>

        <input id="motivo"placeholder="Motivo da Adoção"><br><br>


    </form>

</body>

</html>
